<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Blocks Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            position: relative;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .score {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        #gameCanvas {
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: block;
            margin: 0 auto;
        }

        .game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .game-over.show {
            display: block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .game-over p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        .instructions {
            color: white;
            margin-top: 20px;
            font-size: 1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏗️ Tower Blocks</h1>
        <div class="score-board">
            <div class="score">Score: <span id="score">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="instructions">
            <p>Click or Press SPACE to drop the block!</p>
        </div>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverElement = document.getElementById('gameOver');

        let score = 0;
        let gameRunning = true;
        let blocks = [];
        let currentBlock = null;
        let direction = 1;
        let speed = 2;
        let blockHeight = 30;
        let baseWidth = 150;

        class Block {
            constructor(x, y, width, height, color) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = color;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }
        }

        function getRandomColor() {
            const colors = [
                '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
                '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2',
                '#F8B739', '#52B788'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function init() {
            // Base block
            const baseBlock = new Block(
                canvas.width / 2 - baseWidth / 2,
                canvas.height - blockHeight,
                baseWidth,
                blockHeight,
                getRandomColor()
            );
            blocks.push(baseBlock);

            // First moving block
            createNewBlock();
        }

        function createNewBlock() {
            const lastBlock = blocks[blocks.length - 1];
            currentBlock = new Block(
                0,
                lastBlock.y - blockHeight,
                lastBlock.width,
                blockHeight,
                getRandomColor()
            );
        }

        function update() {
            if (!gameRunning) return;

            // Move current block
            if (currentBlock) {
                currentBlock.x += speed * direction;

                // Bounce off walls
                if (currentBlock.x <= 0 || currentBlock.x + currentBlock.width >= canvas.width) {
                    direction *= -1;
                }
            }
        }

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw all blocks
            for (let block of blocks) {
                block.draw();
            }

            // Draw current block
            if (currentBlock) {
                currentBlock.draw();
            }
        }

        function dropBlock() {
            if (!gameRunning || !currentBlock) return;

            const lastBlock = blocks[blocks.length - 1];

            // Calculate overlap
            const overlapStart = Math.max(currentBlock.x, lastBlock.x);
            const overlapEnd = Math.min(
                currentBlock.x + currentBlock.width,
                lastBlock.x + lastBlock.width
            );
            const overlapWidth = overlapEnd - overlapStart;

            if (overlapWidth <= 0) {
                // Game over - no overlap
                endGame();
                return;
            }

            // Adjust current block to match overlap
            currentBlock.x = overlapStart;
            currentBlock.width = overlapWidth;

            // Add to blocks array
            blocks.push(currentBlock);

            // Update score
            score++;
            scoreElement.textContent = score;

            // Increase difficulty
            if (score % 5 === 0) {
                speed += 0.5;
            }

            // Scroll down if tower gets too high
            if (blocks.length > 15) {
                blocks.shift();
                for (let block of blocks) {
                    block.y += blockHeight;
                }
            }

            // Create new block
            createNewBlock();
        }

        function endGame() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            gameOverElement.classList.add('show');
        }

        function restartGame() {
            // Reset variables
            score = 0;
            gameRunning = true;
            blocks = [];
            currentBlock = null;
            direction = 1;
            speed = 2;

            // Reset UI
            scoreElement.textContent = '0';
            gameOverElement.classList.remove('show');

            // Restart game
            init();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('click', dropBlock);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                dropBlock();
            }
        });

        // Start game
        init();
        gameLoop();
    </script>
</body>
</html>
