<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1.0,
            maximum-scale=1.0,
            user-scalable=no
        "
    >

    <meta name="theme-color" content="#8ed8ff">

    <title>Tower Stack</title>

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= SKY ================= -->

<div class="sky-gradient"></div>

<div class="sun"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="floating-particles"></div>

<!-- ================= MENU ================= -->

<div class="screen" id="menuScreen">

    <div class="menu-wrapper">

        <div class="logo-area">

            <div class="logo-tower">

                <div class="tower-block b1"></div>
                <div class="tower-block b2"></div>
                <div class="tower-block b3"></div>

            </div>

            <h1>
                Tower Stack
            </h1>

            <p>
                Build the tallest tower
            </p>

        </div>

        <div class="menu-buttons">

            <button
                class="menu-button play-button"
                onclick="showScreen('gameScreen')"
            >

                <div class="button-shine"></div>

                <span class="button-icon">
                    ▶
                </span>

                <span>
                    Play
                </span>

            </button>

            <button
                class="menu-button"
                onclick="showScreen('leaderboardScreen')"
            >

                <span class="button-icon">
                    🏆
                </span>

                <span>
                    Leaders
                </span>

            </button>

            <button
                class="menu-button"
                onclick="showScreen('shopScreen')"
            >

                <span class="button-icon">
                    🛍
                </span>

                <span>
                    Shop
                </span>

            </button>

        </div>

        <div class="profile-cards">

            <div class="profile-card">

                <div class="profile-label">
                    BEST
                </div>

                <div
                    class="profile-value"
                    id="menuBestScore"
                >
                    0
                </div>

            </div>

            <div class="profile-card">

                <div class="profile-label">
                    COINS
                </div>

                <div class="profile-value">

                    💰

                    <span id="menuCoins">
                        0
                    </span>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- ================= GAME ================= -->

<div class="screen hidden" id="gameScreen">

    <div class="game-ui">

        <button
            class="circle-btn"
            onclick="showScreen('menuScreen')"
        >
            ←
        </button>

        <div class="score-box">

            <div class="score-title">
                SCORE
            </div>

            <div
                class="score-value"
                id="score"
            >
                0
            </div>

        </div>

        <div class="coins-box">

            💰

            <span id="gameCoins">
                0
            </span>

        </div>

    </div>

    <div
        class="game-area"
        id="gameArea"
    >

        <div class="ambient-light"></div>

        <canvas id="gameCanvas"></canvas>

        <div class="tap-anywhere">

            TAP ANYWHERE

        </div>

    </div>

    <div class="bottom-hint">

        Perfect drops create combo bonuses ✨

    </div>

    <!-- GAME OVER -->

    <div
        class="game-over-overlay"
        id="gameOverOverlay"
    >

        <div class="game-over-card">

            <div class="game-over-light"></div>

            <div class="game-over-title">
                Tower Crashed
            </div>

            <div
                class="game-over-score"
                id="finalScore"
            >
                0
            </div>

            <div class="earned-coins">

                +
                <span id="coinsEarned">
                    0
                </span>

                💰

            </div>

            <div class="game-over-buttons">

                <button
                    class="primary-btn"
                    id="restartButton"
                >

                    Play Again

                </button>

                <button
                    class="secondary-btn"
                    onclick="returnToMenu()"
                >

                    Main Menu

                </button>

            </div>

            <div class="best-result">

                BEST:
                <span id="bestScore">
                    0
                </span>

            </div>

        </div>

    </div>

</div>

<!-- ================= LEADERBOARD ================= -->

<div
    class="screen hidden"
    id="leaderboardScreen"
>

    <div class="page-container">

        <div class="top-bar">

            <button
                class="circle-btn"
                onclick="showScreen('menuScreen')"
            >
                ←
            </button>

            <div class="page-title">
                Leaders
            </div>

            <div style="width:50px"></div>

        </div>

        <div class="leaderboard-tabs">

            <button
                class="tab active"
                onclick="switchTab('global')"
            >
                Global
            </button>

            <button
                class="tab"
                onclick="switchTab('friends')"
            >
                Friends
            </button>

        </div>

        <div
            class="leaderboard-list"
            id="leaderboardList"
        >
        </div>

        <div class="your-rank-card">

            <div class="rank-left">

                <div class="rank-number">

                    #
                    <span id="yourRank">
                        15
                    </span>

                </div>

                <div>

                    <div class="rank-name">
                        You
                    </div>

                    <div class="rank-coins">
                        💰
                        <span id="yourCoins">
                            0
                        </span>
                    </div>

                </div>

            </div>

            <div
                class="rank-score"
                id="yourScore"
            >
                0
            </div>

        </div>

    </div>

</div>

<!-- ================= SHOP ================= -->

<div
    class="screen hidden"
    id="shopScreen"
>

    <div class="page-container">

        <div class="top-bar">

            <button
                class="circle-btn"
                onclick="showScreen('menuScreen')"
            >
                ←
            </button>

            <div class="page-title">
                Shop
            </div>

            <div class="coins-box">

                💰

                <span id="shopCoins">
                    0
                </span>

            </div>

        </div>

        <div class="shop-tabs">

            <button
                class="shop-tab active"
                onclick="switchCategory('blocks')"
            >
                Blocks
            </button>

            <button
                class="shop-tab"
                onclick="switchCategory('backgrounds')"
            >
                Backgrounds
            </button>

            <button
                class="shop-tab"
                onclick="switchCategory('effects')"
            >
                Effects
            </button>

        </div>

        <div
            class="shop-grid"
            id="shopItems"
        >
        </div>

    </div>

</div>

<!-- ================= PARTICLES ================= -->

<div id="particlesContainer"></div>

<!-- ================= SCRIPT ================= -->

<script src="script.js"></script>

</body>
</html>
