<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suitcase Tower</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1a1a2e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --button-color: var(--tg-theme-button-color, #4e54c8);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
        }
        body { margin: 0; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; overflow: hidden; height: 100vh; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .menu { background: rgba(0,0,0,0.8); padding: 20px; border-radius: 20px; pointer-events: auto; text-align: center; width: 80%; max-width: 300px; }
        button { background: var(--button-color); color: var(--button-text-color); border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; margin: 10px; cursor: pointer; width: 100%; }
        #hud { position: absolute; top: 20px; left: 20px; pointer-events: none; font-size: 20px; }
        .hidden { display: none !important; }
        h1 { margin-top: 0; }
    </style>
</head>
<body>

<div id="hud">Очки: <span id="score">0</span> | Монет: <span id="coins">0</span></div>

<div id="ui" class="ui">
    <!-- Главное меню -->
    <div id="main-menu" class="menu">
        <h1>Suitcase Tower</h1>
        <button onclick="startGame()">Играть</button>
        <button onclick="showShop()">Магазин</button>
        <button onclick="showLeaderboard()">Топ игроков</button>
    </div>

    <!-- Магазин -->
    <div id="shop-menu" class="menu hidden">
        <h2>Магазин</h2>
        <div id="shop-items"></div>
        <button onclick="backToMenu()">Назад</button>
    </div>

    <!-- Лидерборд -->
    <div id="leaderboard-menu" class="menu hidden">
        <h2>Топ игроков</h2>
        <div id="leaderboard-list"></div>
        <button onclick="backToMenu()">Назад</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // Состояние игры
    let gameState = 'menu'; // menu, playing, shop, leaderboard
    let score = 0;
    let coins = parseInt(localStorage.getItem('coins')) || 0;
    let bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
    let purchasedSkins = JSON.parse(localStorage.getItem('purchased')) || ['default'];
    let activeSkin = localStorage.getItem('activeSkin') || 'default';

    const skins = {
        'default': { name: 'Стандарт', price: 0, color: '#3498db' },
        'retro': { name: 'Ретро', price: 50, color: '#e67e22' },
        'gold': { name: 'Золотой', price: 200, color: '#f1c40f' }
    };

    let blocks = [];
    let currentBlock = null;
    let direction = 1;
    const blockHeight = 40;
    const blockWidth = 120;

    function startGame() {
        gameState = 'playing';
        document.getElementById('ui').classList.add('hidden');
        blocks = [{x: (canvas.width-blockWidth)/2, y: canvas.height - 100, w: blockWidth}];
        score = 0;
        document.getElementById('score').innerText = score;
        spawnBlock();
        requestAnimationFrame(loop);
    }

    function spawnBlock() {
        currentBlock = { x: 0, y: blocks[blocks.length-1].y - blockHeight, w: blocks[blocks.length-1].w, dir: 1 };
    }

    function loop() {
        if (gameState !== 'playing') return;
        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        // Рисуем башню
        blocks.forEach((b, i) => {
            ctx.fillStyle = skins[activeSkin].color;
            ctx.fillRect(b.x, b.y, b.w, blockHeight);
        });

        // Движение
        if (currentBlock) {
            currentBlock.x += 4 * direction;
            if (currentBlock.x + currentBlock.w > canvas.width || currentBlock.x < 0) direction *= -1;
            ctx.fillStyle = skins[activeSkin].color;
            ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.w, blockHeight);
        }
        requestAnimationFrame(loop);
    }

    // Управление
    window.addEventListener('click', () => {
        if (gameState !== 'playing') return;
        
        const last = blocks[blocks.length-1];
        const overlap = Math.min(last.x + last.w, currentBlock.x + currentBlock.w) - Math.max(last.x, currentBlock.x);
        
        if (overlap <= 0) {
            endGame();
            return;
        }

        currentBlock.w = overlap;
        currentBlock.x = Math.max(last.x, currentBlock.x);
        blocks.push(currentBlock);
        score++;
        coins++;
        document.getElementById('score').innerText = score;
        document.getElementById('coins').innerText = coins;
        localStorage.setItem('coins', coins);
        
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        spawnBlock();
    });

    function endGame() {
        gameState = 'menu';
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        document.getElementById('ui').classList.remove('hidden');
        alert('Игра окончена! Счет: ' + score);
    }

    // Магазин
    function showShop() {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('shop-menu').classList.remove('hidden');
        const list = document.getElementById('shop-items');
        list.innerHTML = '';
        Object.keys(skins).forEach(id => {
            const s = skins[id];
            const btn = document.createElement('button');
            const isOwned = purchasedSkins.includes(id);
            btn.innerText = `${s.name} ${isOwned ? (activeSkin === id ? '(Выбрано)' : '(Куплено)') : '(' + s.price + ' монет)'}`;
            btn.onclick = () => buySkin(id);
            list.appendChild(btn);
        });
    }

    function buySkin(id) {
        if (purchasedSkins.includes(id)) {
            activeSkin = id;
            localStorage.setItem('activeSkin', id);
        } else if (coins >= skins[id].price) {
            coins -= skins[id].price;
            purchasedSkins.push(id);
            localStorage.setItem('coins', coins);
            localStorage.setItem('purchased', JSON.stringify(purchasedSkins));
        }
        showShop();
    }

    function backToMenu() {
        document.querySelectorAll('.menu').forEach(m => m.classList.add('hidden'));
        document.getElementById('main-menu').classList.remove('hidden');
    }

    function showLeaderboard() {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('leaderboard-menu').classList.remove('hidden');
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = `<div>${tg.initDataUnsafe?.user?.first_name || 'Вы'}: ${score}</div><div>Друг: 45</div><div>Игрок: 30</div>`;
    }

</script>
</body>
</html>
