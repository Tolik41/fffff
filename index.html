<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0,
          maximum-scale=1.0,
          user-scalable=no">

    <meta name="theme-color" content="#3390ec">

    <title>Tower Blocks Premium</title>

    <!-- Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-grid"></div>

<!-- ================= MENU SCREEN ================= -->
<div class="screen" id="menuScreen">

    <div class="menu-container">

        <div class="game-logo">
            <div class="logo-glow"></div>

            <div class="logo-icon">
                🏗️
            </div>

            <h1>Tower Blocks</h1>

            <p class="tagline">
                Stack blocks as high as possible
            </p>
        </div>

        <div class="menu-buttons">

            <button class="menu-btn play-btn"
                    onclick="showScreen('gameScreen')">

                <div class="btn-bg"></div>

                <span class="btn-icon">
                    🎮
                </span>

                <span class="btn-text">
                    Play
                </span>

            </button>

            <button class="menu-btn"
                    onclick="showScreen('leaderboardScreen')">

                <span class="btn-icon">
                    🏆
                </span>

                <span class="btn-text">
                    Leaderboard
                </span>

            </button>

            <button class="menu-btn"
                    onclick="showScreen('shopScreen')">

                <span class="btn-icon">
                    🛍️
                </span>

                <span class="btn-text">
                    Shop
                </span>

            </button>

        </div>

        <div class="user-stats">

            <div class="stat-item">
                <div class="stat-label">
                    BEST SCORE
                </div>

                <div class="stat-value"
                     id="menuBestScore">
                    0
                </div>
            </div>

            <div class="stat-item">
                <div class="stat-label">
                    COINS
                </div>

                <div class="stat-value">
                    💰
                    <span id="menuCoins">
                        0
                    </span>
                </div>
            </div>

        </div>

    </div>

</div>

<!-- ================= GAME SCREEN ================= -->
<div class="screen hidden"
     id="gameScreen">

    <div class="game-container">

        <!-- HEADER -->
        <div class="header">

            <button class="back-btn"
                    onclick="showScreen('menuScreen')">

                ←

            </button>

            <div class="header-center">

                <div class="score-display"
                     id="score">
                    0
                </div>

            </div>

            <div class="coins-display">
                💰
                <span id="gameCoins">
                    0
                </span>
            </div>

        </div>

        <!-- GAME AREA -->
        <div class="canvas-wrapper"
             id="canvasWrapper">

            <div class="canvas-glow"></div>

            <canvas id="gameCanvas"></canvas>

            <div class="tap-hint">
                TAP ANYWHERE
            </div>

        </div>

        <!-- FOOTER -->
        <div class="controls">

            <div class="instructions">
                Perfect drops give bonus effects ✨
            </div>

        </div>

    </div>

    <!-- GAME OVER -->
    <div class="game-over-overlay"
         id="gameOverOverlay">

        <div class="game-over-modal">

            <div class="modal-glow"></div>

            <h2>
                Game Over
            </h2>

            <div class="final-score"
                 id="finalScore">
                0
            </div>

            <div class="coins-earned">
                +
                <span id="coinsEarned">
                    0
                </span>
                💰
            </div>

            <p>
                Your tower collapsed
            </p>

            <div class="game-over-buttons">

                <button class="restart-btn"
                        id="restartButton">

                    Play Again

                </button>

                <button class="menu-return-btn"
                        onclick="returnToMenu()">

                    Main Menu

                </button>

            </div>

            <div class="best-score">
                BEST:
                <span id="bestScore">
                    0
                </span>
            </div>

        </div>

    </div>

</div>

<!-- ================= LEADERBOARD ================= -->
<div class="screen hidden"
     id="leaderboardScreen">

    <div class="leaderboard-container">

        <div class="screen-header">

            <button class="back-btn"
                    onclick="showScreen('menuScreen')">

                ←

            </button>

            <h2>
                Leaderboard
            </h2>

            <div style="width:40px"></div>

        </div>

        <div class="leaderboard-tabs">

            <button class="tab-btn active"
                    onclick="switchTab('global')">

                Global

            </button>

            <button class="tab-btn"
                    onclick="switchTab('friends')">

                Friends

            </button>

        </div>

        <div class="leaderboard-list"
             id="leaderboardList">
        </div>

        <div class="your-rank">

            <div class="rank-item own-rank">

                <div class="rank-position">
                    #
                    <span id="yourRank">
                        -
                    </span>
                </div>

                <div class="rank-info">

                    <div class="rank-name">
                        You
                    </div>

                    <div class="rank-coins">
                        💰
                        <span id="yourCoins">
                            0
                        </span>
                    </div>

                </div>

                <div class="rank-score"
                     id="yourScore">
                    0
                </div>

            </div>

        </div>

    </div>

</div>

<!-- ================= SHOP ================= -->
<div class="screen hidden"
     id="shopScreen">

    <div class="shop-container">

        <div class="screen-header">

            <button class="back-btn"
                    onclick="showScreen('menuScreen')">

                ←

            </button>

            <h2>
                Shop
            </h2>

            <div class="header-coins">

                💰
                <span id="shopCoins">
                    0
                </span>

            </div>

        </div>

        <!-- CATEGORIES -->
        <div class="shop-categories">

            <button class="category-btn active"
                    onclick="switchCategory('blocks')">

                Blocks

            </button>

            <button class="category-btn"
                    onclick="switchCategory('backgrounds')">

                Backgrounds

            </button>

            <button class="category-btn"
                    onclick="switchCategory('power-ups')">

                Power-ups

            </button>

        </div>

        <!-- ITEMS -->
        <div class="shop-items"
             id="shopItems">
        </div>

    </div>

</div>

<!-- ================= PARTICLES ================= -->
<div id="particlesContainer"></div>

<!-- ================= SCRIPT ================= -->
<script src="script.js"></script>

</body>
</html>
