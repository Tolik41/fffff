<!--
Tower Block Telegram Mini App

Описание:
Этот файл отвечает за интерфейс игры.
Содержит меню, игровую сцену и подключение стилей и скриптов.

Принцип работы:
1. Отображает главное меню.
2. Запускает игровую сцену.
3. Подключает canvas для рендера.
4. Подключает script.js с игровой логикой.
-->

<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Tower Block</title>

    <!-- 1. Подключение Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 2. Встроенные стили -->
    <style>

        /* ====================================================== */
        /* 1. Базовые стили */
        /* ====================================================== */

        body {

            margin: 0;

            padding: 0;

            overflow: hidden;

            background: #111111;

            color: white;

            font-family: Arial, sans-serif;
        }

        /* ====================================================== */
        /* 2. Главное меню */
        /* ====================================================== */

        #menu-screen {

            width: 100vw;

            height: 100vh;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            gap: 16px;
        }

        /* Заголовок игры */
        .game-title {

            font-size: 42px;

            font-weight: bold;
        }

        /* ====================================================== */
        /* 3. Кнопки */
        /* ====================================================== */

        button {

            width: 260px;

            height: 56px;

            border: none;

            border-radius: 14px;

            background: white;

            color: black;

            font-size: 18px;

            cursor: pointer;
        }

        /* ====================================================== */
        /* 4. Игровой экран */
        /* ====================================================== */

        #game-screen {

            position: relative;

            width: 100vw;

            height: 100vh;
        }

        /* Скрытие блока */
        .hidden {

            display: none;
        }

        /* ====================================================== */
        /* 5. Игровой canvas */
        /* ====================================================== */

        #game-canvas {

            width: 100%;

            height: 100%;

            background: #1a1a1a;
        }

        /* ====================================================== */
        /* 6. Панель статистики */
        /* ====================================================== */

        #score-panel {

            position: absolute;

            top: 20px;

            left: 20px;

            z-index: 10;

            font-size: 18px;
        }

    </style>

</head>

<body>

    <!-- ====================================================== -->
    <!-- 1. Главное меню -->
    <!-- ====================================================== -->

    <div id="menu-screen">

        <!-- Заголовок -->
        <div class="game-title">
            TOWER BLOCK
        </div>

        <!-- Кнопка игры -->
        <button id="play-button">
            Играть
        </button>

        <!-- Кнопка рейтинга -->
        <button id="rating-button">
            Рейтинг игроков
        </button>

        <!-- Кнопка призов -->
        <button id="prize-button">
            Мои призы
        </button>

    </div>

    <!-- ====================================================== -->
    <!-- 2. Игровой экран -->
    <!-- ====================================================== -->

    <div
        id="game-screen"
        class="hidden"
    >

        <!-- Игровой canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- Панель очков -->
        <div id="score-panel">

            <div>
                Этаж:
                <span id="level">1</span>
            </div>

            <div>
                Очки:
                <span id="score">0</span>
            </div>

            <div>
                Комбо:
                <span id="combo">x1</span>
            </div>

        </div>

    </div>

    <!-- ====================================================== -->
    <!-- 3. Подключение игровой логики -->
    <!-- ====================================================== -->

    <script src="script.js"></script>

</body>

</html>
